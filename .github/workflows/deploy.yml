name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
    # Only redeploy the docs site when the demo or library source changes.
    # Pure doc-only commits (README, etc.) won't trigger a rebuild; use the
    # manual "Run workflow" button below if you ever need to force a deploy.
    paths:
      - 'src/**'
      - 'demo/**'
      - 'index.html'
      - 'vite.config.ts'
      - 'tailwind.config.ts'
      - 'postcss.config.js'
  workflow_dispatch:

# Allow the workflow to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; cancel superseded runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build:demo

      - uses: actions/upload-pages-artifact@v3
        with:
          path: demo-dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
